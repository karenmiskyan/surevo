name: Deploy Surevo

on:
  push:
    branches:
      - main
    paths:
      - "v2/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: surevo-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://surevo.ai
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/surevo_deploy_key
          chmod 600 ~/.ssh/surevo_deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current site
        run: |
          ssh -i ~/.ssh/surevo_deploy_key \
            -o IdentitiesOnly=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'set -euo pipefail
             BACKUP_DIR="/home/surevo/backups/public_html-$(date +%Y%m%d-%H%M%S)"
             mkdir -p /home/surevo/backups
             if [ -d /home/surevo/public_html ]; then
               cp -a /home/surevo/public_html "$BACKUP_DIR"
             fi
             ls -1dt /home/surevo/backups/public_html-* 2>/dev/null | tail -n +6 | xargs -r rm -rf'

      - name: Deploy to cPanel document root
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/surevo_deploy_key -o IdentitiesOnly=yes" \
            out/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/surevo/public_html/"

      - name: Fix ownership and permissions
        run: |
          ssh -i ~/.ssh/surevo_deploy_key \
            -o IdentitiesOnly=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'set -euo pipefail
             chown -R surevo:surevo /home/surevo/public_html
             find /home/surevo/public_html -type d -exec chmod 755 {} \;
             find /home/surevo/public_html -type f -exec chmod 644 {} \;'
